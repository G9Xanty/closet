<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexion — Closet Elander</title>
<style>
  @font-face {
    font-family: "arcade";
    src: url("/assets/Press_Start_2P/PressStart2P-Regular.ttf") format("truetype");
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#07070a;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    padding:20px;
    text-align:center;
  }
  h1{
    font-family:'arcade',monospace;
    font-size:clamp(1rem,4vw,1.6rem);
    color:#e2412f;
    text-shadow:0 0 20px #e2412f;
  }
  p{color:#88889a;font-size:clamp(0.8rem,2.5vw,1rem);line-height:1.6}
  .retry-btn{
    padding:12px 30px;
    background:#e2412f;
    color:#fff;
    border:none;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    box-shadow:0 0 15px rgba(226,65,47,0.4);
    border-radius:6px;
  }
  .retry-btn:hover{background:#c93a2a}
</style>
</head>
<body>
  <h1>CLOSET ELANDER</h1>
  <p>Sin conexion a internet.<br>Revisa tu red e intenta de nuevo.</p>
  <button class="retry-btn" onclick="location.reload()">Reintentar</button>
</body>
</html>
